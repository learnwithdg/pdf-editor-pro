name: pdf_editor_app
description: A polished PDF viewer and annotation editor built with Flutter.
publish_to: 'none'
version: 1.2.6+9

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  file_picker: ^11.0.2
  flutter_bloc: ^9.1.1
  google_fonts: ^8.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.12.0
  pdfx: ^2.9.2
  share_plus: ^12.0.2
  uuid: ^4.5.1
  google_mlkit_text_recognition: ^0.15.1
  pdf_worker: ^1.0.6
  shared_preferences: ^2.3.5
  vibration: ^2.0.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  printing: ^5.14.3
  http: ^1.2.2
  flutter_animate: ^4.5.2
  lottie: ^3.1.2
  google_mobile_ads: ^8.0.0
  archive: ^4.0.9
  xml: ^6.6.1
  flutter_secure_storage: ^10.1.0
  flutter_appauth: ^12.0.0
  google_sign_in: ^7.2.0
  crypto: ^3.0.7
  gallery_saver_plus: ^3.2.9
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
